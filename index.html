<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>群星失序 Stars Out of Order - v0.5</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root { --u: 1vmin; }
        body { margin: 0; background: #000; font-family: sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; }
        
        /* 載入畫面 */
        .loading-screen { position: fixed; inset: 0; background: #000; z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #fff; }
        .loading-bar-wrap { width: 50%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-top: 20px; overflow: hidden; }
        .loading-bar-fill { height: 100%; background: #d4af37; transition: width 0.2s; }

        .landscape-app { position: relative; width: 177.78vh; height: 100vh; max-width: 100vw; max-height: 56.25vw; background: #000; overflow: hidden; }
        
        /* 回歸原本做法：6 個影片標籤並存，解決黑畫面問題 */
        .bg-video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; transition: opacity 1s ease; opacity: 0; pointer-events: none; }
        .bg-video.active { opacity: 1; pointer-events: auto; }
        
        @media screen and (orientation: portrait) {
            body::after { content: "請橫放手機 💫"; position: fixed; inset: 0; background: #000; color: #fff; z-index: 10000; display: flex; justify-content: center; align-items: center; font-size: 5vmin; }
        }

        .top-nav { position: absolute; top: 1.5vmin; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 1.5vmin; z-index: 5000; background: rgba(0,0,0,0.7); padding: 1vmin 3vmin; border-radius: 4vmin; border: 0.15vmin solid #fff; }
        .nav-label { color: #fff; font-weight: bold; font-size: 1.8vmin; }
        .btn-circle { width: 4vmin; height: 4vmin; border-radius: 50%; border: 0.15vmin solid #fff; background: none; color: #fff; font-size: 1.8vmin; cursor: pointer; }
        .btn-circle.active { background: #fff; color: #000; }
        
        .role-display { position: absolute; top: 11vmin; left: 50%; transform: translateX(-50%); display: flex; gap: 1vmin; z-index: 400; }
        .role-icon { width: 8vmin; height: 8vmin; object-fit: contain; border: 0.15vmin solid #fff; border-radius: 1vmin; }

        @keyframes breathingUI { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
        .center-btn-box { position: absolute; left: 50%; width: 45%; z-index: 100; pointer-events: none; display: flex; flex-direction: column; align-items: center; animation: breathingUI 3s infinite ease-in-out; transform: translate(-50%, -50%); }
        .center-img { width: 100%; }
        .center-trigger { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 70%; height: 70%; z-index: 110; pointer-events: auto; cursor: pointer; }
        
        .coord-slot { position: absolute; width: 5.12%; aspect-ratio: 1/1.4; transform: translate(-50%, -50%); z-index: 1000; cursor: pointer; }
        .card-wrap { position: relative; width: 100%; height: 100%; }
        
        .glow-red { box-shadow: 0 0 2.5vmin 1vmin rgba(255, 0, 0, 0.9) !important; }
        .glow-blue { box-shadow: 0 0 2.5vmin 1vmin rgba(0, 100, 255, 0.9) !important; }
        .glow-gold { box-shadow: 0 0 2.5vmin 1vmin rgba(255, 215, 0, 0.9) !important; }
        .glow-teal { box-shadow: 0 0 2.5vmin 1vmin rgba(0, 255, 220, 0.9) !important; }
        .glow-inspect { box-shadow: 0 0 4vmin 1.8vmin rgba(255, 240, 0, 1) !important; z-index: 1001; }

        .counter-box { position: absolute; top: 3vmin; font-size: 4.5vmin; font-weight: 900; color: #fff; z-index: 600; text-shadow: 0 0 1vmin #000; }
        .sun-counter { left: 4vmin; color: #f1c40f; }
        .moon-counter { right: 4vmin; color: #9b59b6; }

        .mission-area { position: absolute; top: 2%; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 0.8vmin; z-index: 800; width: 90%; }
        .mission-cards-row { display: flex; gap: 1.2vmin; justify-content: center; }
        .mission-card { width: 7vmin; cursor: pointer; object-fit: contain; }
        .star-pool-glow { box-shadow: 0 0 1.5vmin 0.5vmin #d4af37, 0 0 2vmin 0.8vmin #8e44ad !important; border-radius: 0.5vmin; }

        .modal-overlay { position: absolute; inset: 0; z-index: 9999; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; }
        .pop-menu { background: #111; border: 0.2vmin solid #fff; padding: 2.5vmin; border-radius: 2.5vmin; display: flex; flex-direction: column; gap: 1.5vmin; box-shadow: 0 0 5vmin #000; min-width: 25vmin; }
        .pop-btn { background: #333; color: #fff; border: 0.15vmin solid #666; padding: 1.5vmin 2vmin; cursor: pointer; font-size: 2.2vmin; border-radius: 1.5vmin; text-align: center; }

        .info-status-bar { position: absolute; bottom: 12vmin; left: 50%; transform: translateX(-50%); color: #fff; background: rgba(0,0,0,0.5); padding: 0.8vmin 4vmin; border-radius: 2.5vmin; font-size: 2.2vmin; font-weight: bold; border: 0.15vmin solid rgba(255,255,255,0.2); white-space: nowrap; }
        .reset-area { position: absolute; bottom: 2vmin; right: 2vmin; z-index: 5000; }
        .btn-reset-main { background: rgba(255,255,255,0.15); color: #fff; border: 0.15vmin solid #aaa; padding: 1vmin 2vmin; border-radius: 3vmin; cursor: pointer; font-size: 1.8vmin; }
        .version-tag { position: absolute; bottom: 2vmin; left: 2vmin; color: rgba(255,255,255,0.3); font-size: 1.5vmin; }
        .check-card-overlay { position: absolute; top: 25%; left: 50%; transform: translate(-50%, -50%); width: 13vmin; z-index: 3000; pointer-events: none; animation: breathingCard 2.5s infinite ease-in-out; }
        @keyframes breathingCard { 0%, 100% { opacity: 0.4; transform: translate(-50%, -50%) scale(0.95); } 50% { opacity: 1; transform: translate(-50%, -50%) scale(1); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const BASE_URL = "https://raw.githubusercontent.com/n0man-board/stars-out-of-order-assets/main/images/";

        // 僅定義圖片資源進行預載
        const ROLES = ["zeus", "hades", "prophet", "apollo", "athena", "prometheus", "odysseus", "daedalus", "melampus", "cassandra", "charon", "cerberus", "hecate", "pandora"];
        const UI_IMAGES = ["star.png", "set_1.png", "set_2.png", "set_3.png", "set_4.png", "set_5.png", "set_6.png", "set_7_1.png", "set_7_2.png", "set_8.png", "set_9.png", "set_10.png", "set_11.png", "set_12.png", "set_13.png", "card_0.png", "card_1.png", "card_2.png", "card_3.png"];
        
        const PLAYER_POSITIONS = {
          "13": [{left:21.4,top:77.9},{left:10.3,top:70.0},{left:5.7,top:60.2},{left:8.2,top:50.2},{left:17.7,top:41.6},{left:32.4,top:35.8},{left:50.0,top:33.8},{left:67.6,top:35.8},{left:82.3,top:41.6},{left:91.8,top:50.2},{left:94.3,top:60.2},{left:89.7,top:70.0},{left:78.6,top:77.9}],
          "12": [{left:21.4,top:77.9},{left:13.6,top:73.1},{left:6.6,top:53.6},{left:15.4,top:43.0},{left:29.1,top:36.7},{left:42.3,top:34.1},{left:57.7,top:34.1},{left:72.2,top:36.7},{left:84.6,top:43.0},{left:93.4,top:53.6},{left:90.3,top:69.3},{left:78.6,top:77.9}],
          "11": [{left:21.4,top:77.9},{left:8.6,top:67.7},{left:8.2,top:50.2},{left:19.7,top:40.5},{left:34.8,top:35.3},{left:50.0,top:33.8},{left:65.2,top:35.3},{left:80.3,top:40.5},{left:91.8,top:50.2},{left:91.4,top:67.7},{left:78.6,top:77.9}],
          "10": [{left:21.4,top:77.9},{left:8.2,top:67.3},{left:8.2,top:50.2},{left:21.4,top:39.6},{left:40.0,top:34.4},{left:60.0,top:34.4},{left:78.6,top:39.6},{left:91.8,top:50.2},{left:91.8,top:67.3},{left:78.6,top:77.9}],
          "9": [{left:21.4,top:77.9},{left:7.1,top:65.3},{left:13.6,top:44.4},{left:31.2,top:36.1},{left:50.0,top:33.8},{left:68.8,top:38.4},{left:86.4,top:44.4},{left:92.9,top:65.3},{left:78.6,top:77.9}],
          "8": [{left:21.4,top:77.9},{left:5.8,top:60.9},{left:18.6,top:41.1},{left:34.8,top:34.6},{left:61.6,top:34.6},{left:81.4,top:41.1},{left:94.2,top:60.9},{left:78.6,top:77.9}],
          "7": [{left:21.4,top:77.9},{left:6.7,top:57.9},{left:24.6,top:38.3},{left:50.0,top:33.8},{left:75.4,top:38.3},{left:93.3,top:57.9},{left:78.6,top:77.9}],
          "6": [{left:21.4,top:77.9},{left:6.2,top:54.4},{left:34.8,top:35.3},{left:65.2,top:35.3},{left:93.8,top:54.4},{left:78.6,top:77.9}],
          "5": [{left:21.4,top:77.9},{left:6.0,top:55.0},{left:50.0,top:33.8},{left:94.0,top:55.0},{left:78.6,top:77.9}]
        };

        const MOON_TARGETS = { "5":2, "6":2, "7":3, "8":3, "9":4, "10":4, "11":4, "12":5, "13":5 };
        const SUN_GOALS = { "5":9, "6":11, "7":12, "8":14, "9":15, "10":17, "11":18, "12":20, "13":21 };
        const ROLE_POOL_MAP = {
          "5": ["zeus", "hades", "pandora", "cassandra", "odysseus"],
          "6": ["zeus", "hades", "apollo", "hecate", "cassandra", "odysseus"],
          "7": ["zeus", "hades", "apollo", "hecate", "pandora", "cassandra", "odysseus"],
          "8": ["zeus", "hades", "apollo", "hecate", "prometheus", "charon", "cassandra", "odysseus"],
          "9": ["zeus", "hades", "apollo", "hecate", "prometheus", "charon", "pandora", "cassandra", "odysseus"],
          "10": ["zeus", "hades", "apollo", "hecate", "athena", "charon", "cerberus", "cassandra", "odysseus", "daedalus"],
          "11": ["zeus", "hades", "apollo", "hecate", "prometheus", "charon", "cerberus", "cassandra", "odysseus", "daedalus", "melampus"],
          "12": ["zeus", "hades", "apollo", "hecate", "prometheus", "charon", "cerberus", "pandora", "cassandra", "odysseus", "daedalus", "melampus"],
          "13": ["zeus", "hades", "apollo", "hecate", "prometheus", "athena", "charon", "cerberus", "pandora", "cassandra", "odysseus", "daedalus", "melampus"]
        };
        const MISSION_MAP = {
          "5": [2, 2, 3, 3, 4, 4], "6": [2, 3, 3, 4, 4, 5], "7": [3, 3, 4, 4, 5, 5],
          "8": [3, 4, 4, 5, 5, 6], "9": [4, 4, 5, 5, 6, 6], "10": [4, 5, 5, 6, 6, 7],
          "11": [5, 5, 6, 6, 7, 7], "12": [5, 6, 6, 7, 7, 8], "13": [6, 6, 7, 7, 8, 8]
        };
        const FACTIONS = { sun_gods: ["zeus", "apollo", "athena", "prometheus"], mortals: ["odysseus", "daedalus", "melampus", "cassandra", "prometheus", "prophet"] };

        function StarsApp() {
          const [isLoaded, setIsLoaded] = useState(false);
          const [loadProgress, setLoadProgress] = useState(0);
          const [step, setStep] = useState(1);
          const [playerCount, setPlayerCount] = useState(null);
          const [players, setPlayers] = useState([]);
          const [round, setRound] = useState(1);
          const [sunScore, setSunScore] = useState(0);
          const [lastSunScore, setLastSunScore] = useState(0); 
          const [moonScore, setMoonScore] = useState(0);
          const [tempCards, setTempCards] = useState([]);
          const [inspectingId, setInspectingId] = useState(null);
          const [activeMenuId, setActiveMenuId] = useState(null);
          const [showReset, setShowReset] = useState(false);

          // 圖片預載邏輯
          useEffect(() => {
            const allImages = [...ROLES.map(r => `${r}.png`), ...ROLES.map(r => `${r}_D.png`), ...UI_IMAGES];
            for(let i=1; i<=13; i++){
                const n = String(i).padStart(2,'0');
                allImages.push(`idx_${n}.png`, `s${n}.png`);
            }
            let loadedCount = 0;
            allImages.forEach(src => {
                const img = new Image();
                img.src = `${BASE_URL}${src}`;
                img.onload = () => {
                    loadedCount++;
                    setLoadProgress(Math.round((loadedCount / allImages.length) * 100));
                    if (loadedCount >= allImages.length) setIsLoaded(true);
                };
                img.onerror = () => { loadedCount++; if (loadedCount >= allImages.length) setIsLoaded(true); };
            });
          }, []);

          // 判斷當前階段應顯示的影片標籤
          const activeVid = useMemo(() => {
              if (step <= 2) return "v1";
              if (step >= 3 && step <= 6) return "v2";
              if (step === 7 || step === 8 || step === 12 || step === 13) return "v3";
              if (step >= 9 && step <= 11) return "v4";
              if (step === 14) return "v5";
              if (step === 15) return "v6";
              return "v4";
          }, [step]);

          // --- 原始邏輯保持不變 ---
          const initGame = (n) => {
            setPlayerCount(n);
            setPlayers(Array.from({ length: n }, (_, i) => ({ id: i + 1, side: 'sun', role: null, isInfected: false, isGlow: false, status: 'idx' })));
            setInspectingId(null);
          };
          const fullReset = () => {
            setStep(1); setPlayerCount(null); setPlayers([]); setRound(1);
            setSunScore(0); setMoonScore(0); setInspectingId(null); setShowReset(false);
          };
          const sunTarget = playerCount ? SUN_GOALS[playerCount] : 0;
          const progress = sunTarget ? Math.round((sunScore / sunTarget) * 100) : 0;
          const hitMilestone = useMemo(() => {
            const milestones = [3, 5, 8, 11, 14, 17, 20];
            return milestones.some(m => sunScore >= m && lastSunScore < m);
          }, [sunScore, lastSunScore]);
          const checkVictoryResult = () => {
            if (!playerCount) return "CONTINUE";
            const confirmedRevealed = players.map(p => p.role).filter(r => r !== null);
            const hiddenPool = ROLE_POOL_MAP[playerCount].filter(r => !confirmedRevealed.includes(r));
            const aliveRoles = [...players.filter(p => p.status !== 'returned' && p.role).map(p => p.role), ...hiddenPool];
            if (!aliveRoles.some(r => FACTIONS.sun_gods.includes(r)) || !aliveRoles.some(r => FACTIONS.mortals.includes(r))) return "MOON_WIN";
            if (sunScore >= sunTarget) return "SUN_WIN";
            return "CONTINUE";
          };
          const validation = useMemo(() => {
            if (!playerCount) return { ok: true };
            if (step === 3) {
              const moons = players.filter(p => p.side === 'moon').length;
              return { ok: moons === MOON_TARGETS[playerCount], hint: moons !== MOON_TARGETS[playerCount] ? `需設置 ${MOON_TARGETS[playerCount]} 位月方` : "" };
            }
            if (step === 4) {
              if (!players.some(p => p.role === 'zeus') || !players.some(p => p.role === 'hades') || !players.some(p => p.role === 'prophet')) return { ok: false, hint: "需完成核心身分設置" };
            }
            return { ok: true };
          }, [step, players, playerCount]);
          const centerImgName = useMemo(() => {
            if (step === 1) return playerCount ? "set_1.png" : "star.png";
            if (step === 8) return hitMilestone ? "set_7_2.png" : "set_7_1.png";
            if (step === 12) return "set_4.png"; if (step === 13) return "set_11.png";
            if (step === 14) return "set_12.png"; if (step === 15) return "set_13.png";
            return `set_${step - 1}.png`;
          }, [step, playerCount, hitMilestone]);
          const onCenterClick = () => {
            if (step === 1 && !playerCount) return; if (!validation.ok) return;
            setInspectingId(null); if (step === 1) { setStep(3); return; }
            if (step === 7) {
              setLastSunScore(sunScore); let s = 0, m = 0;
              tempCards.forEach(c => { if(c === 1) s++; if(c === 2) m++; });
              setSunScore(v => v + s); setMoonScore(v => v + m);
            }
            if (step === 13) {
              const res = checkVictoryResult();
              if (res === "MOON_WIN") setStep(15); else if (res === "SUN_WIN") setStep(14);
              else { setRound(r => r + 1); setPlayers(prev => prev.map(p => ({ ...p, isGlow: false }))); setStep(7); }
            } else if (step < 14) setStep(s => s + 1);
            setActiveMenuId(null);
          };
          const onCoordClick = (e, p) => {
            e.stopPropagation(); if (step <= 2 || step === 6 || step === 9) return;
            if (step === 5 || step === 12) { setInspectingId(p.id === inspectingId ? null : p.id); return; }
            setActiveMenuId(p.id);
          };
          useEffect(() => {
            const count = playerCount ? (MISSION_MAP[playerCount][round - 1] || MISSION_MAP[playerCount][MISSION_MAP[playerCount].length-1]) + (round===1?2:round===2?1:0) : 0;
            if (step === 7) setTempCards(new Array(count).fill(0));
          }, [step, round, playerCount]);
          const getFilteredRoles = () => {
            if (!playerCount || !activeMenuId) return [];
            const usedRoles = players.filter(p => p.id !== activeMenuId && p.role !== null).map(p => p.role);
            let pool = ["zeus", "hades", "prophet", ...ROLE_POOL_MAP[playerCount]];
            const activeP = players.find(p => p.id === activeMenuId);
            if (step === 4 && activeP) pool = activeP.side === 'moon' ? ["hades"] : ["zeus", "prophet"];
            return [...new Set(pool)].filter(r => !usedRoles.includes(r));
          };

          const activePlayer = useMemo(() => players.find(p => p.id === activeMenuId), [activeMenuId, players]);
          const inspectTarget = useMemo(() => players.find(p => p.id === inspectingId), [inspectingId, players]);

          if (!isLoaded) return (
            <div className="loading-screen">
                <div style={{fontSize:'3vmin', color:'#d4af37'}}>同步星際通訊... {loadProgress}%</div>
                <div className="loading-bar-wrap"><div className="loading-bar-fill" style={{width: `${loadProgress}%`}}></div></div>
            </div>
          );

          return (
            <div className="landscape-app" onClick={() => { setActiveMenuId(null); setInspectingId(null); }}>
              {/* 原本做法：6 個 Video 同時渲染在 DOM，切換 class 來變換可見度 */}
              <video className={`bg-video ${activeVid==='v1'?'active':''}`} autoPlay loop muted playsInline><source src={`${BASE_URL}bg_video1.mp4`} type="video/mp4" /></video>
              <video className={`bg-video ${activeVid==='v2'?'active':''}`} autoPlay loop muted playsInline><source src={`${BASE_URL}bg_video2.mp4`} type="video/mp4" /></video>
              <video className={`bg-video ${activeVid==='v3'?'active':''}`} autoPlay loop muted playsInline><source src={`${BASE_URL}bg_video3.mp4`} type="video/mp4" /></video>
              <video className={`bg-video ${activeVid==='v4'?'active':''}`} autoPlay loop muted playsInline><source src={`${BASE_URL}bg_video4.mp4`} type="video/mp4" /></video>
              <video className={`bg-video ${activeVid==='v5'?'active':''}`} autoPlay loop muted playsInline><source src={`${BASE_URL}bg_video5.mp4`} type="video/mp4" /></video>
              <video className={`bg-video ${activeVid==='v6'?'active':''}`} autoPlay loop muted playsInline><source src={`${BASE_URL}bg_video6.mp4`} type="video/mp4" /></video>

              {step === 1 && (
                <div className="top-nav" onClick={e => e.stopPropagation()}>
                  <div className="nav-label">選擇人數：</div>
                  {[5,6,7,8,9,10,11,12,13].map(n => ( <button key={n} className={`btn-circle ${playerCount === n ? 'active' : ''}`} onClick={() => initGame(n)}>{n}</button> ))}
                </div>
              )}

              {(step === 1 || step === 2) && playerCount && (
                <div className="role-display">
                  {ROLE_POOL_MAP[playerCount].map(r => ( <img key={r} src={`${BASE_URL}${r}.png`} className="role-icon" /> ))}
                </div>
              )}

              <div className="center-btn-box" style={{ top: step === 1 ? '52%' : 'calc(52% + 2vmin)' }}>
                <img src={`${BASE_URL}${centerImgName}`} className="center-img" />
                <div className="center-trigger" onClick={(e) => { e.stopPropagation(); onCenterClick(); }} />
                {!validation.ok && step > 1 && <div className="lock-hint">{validation.hint}</div>}
              </div>

              {playerCount && PLAYER_POSITIONS[playerCount].map((pos, i) => {
                const p = players[i]; if (!p) return null;
                const xx = String(p.id).padStart(2, '0');
                let img = p.status === 'returned' ? `${p.role}_D.png` : (p.status === 'revealed' ? `${p.role}.png` : `idx_${xx}.png`);
                let glow = p.id === inspectingId ? "glow-inspect" : (p.isGlow ? "glow-red" : (step === 3 && p.side === 'moon' ? "glow-blue" : (step === 4 && p.role === 'zeus' ? "glow-gold" : (step === 4 && p.role === 'hades' ? "glow-blue" : (step === 4 && p.role === 'prophet' ? "glow-teal" : "")))));
                return (
                  <div key={p.id} className={`coord-slot ${glow}`} style={{ left: `${pos.left}%`, top: `${pos.top}%` }} onClick={(e) => onCoordClick(e, p)}>
                    <div className="card-wrap">
                      <img src={`${BASE_URL}${img}`} width="100%" height="100%" style={{ objectFit: 'contain' }} />
                      <img src={`${BASE_URL}s${xx}.png`} style={{ position: 'absolute', inset: 0, width: '100%', objectFit: 'contain' }} />
                    </div>
                  </div>
                );
              })}

              {(step === 7 || step === 8) && ( <div className="info-status-bar"> 第 {round} 輪任務 | 目標：{sunTarget} | 達成率：{progress}% </div> )}
              {(step === 7 || step === 8 || step >= 13) && ( <div style={{pointerEvents:'none'}}> <div className="counter-box sun-counter">日: {sunScore}</div> <div className="counter-box moon-counter">月: {moonScore}</div> </div> )}

              {step === 7 && (
                <div className="mission-area" onClick={e => e.stopPropagation()}>
                  <div className="mission-cards-row">
                    {tempCards.map((c, idx) => {
                      const isStarPool = (round === 1 && idx >= tempCards.length - 2) || (round === 2 && idx >= tempCards.length - 1);
                      return ( <img key={idx} src={`${BASE_URL}card_${c}.png`} className={`mission-card ${isStarPool ? 'star-pool-glow' : ''}`} onClick={() => { const next = [...tempCards]; next[idx] = (next[idx] + 1) % 4; setTempCards(next); }} /> );
                    })}
                  </div>
                  {(round === 1 || round === 2) && <div className="mission-legend">紫金邊框：星池公牌</div>}
                </div>
              )}

              {inspectTarget && ( <img src={`${BASE_URL}${inspectTarget.isInfected ? 'card_2.png' : (['zeus','hades','prophet'].includes(inspectTarget.role) ? 'card_0.png' : (inspectTarget.side === 'moon' ? 'card_2.png' : 'card_1.png'))}`} className="check-card-overlay" /> )}

              <div className="reset-area"> <button className="btn-reset-main" onClick={(e) => { e.stopPropagation(); setShowReset(true); }}>重新開始</button> </div>
              <div className="version-tag">APP v0.5</div>

              {showReset && (
                  <div className="modal-overlay" onClick={() => setShowReset(false)}>
                      <div className="pop-menu" onClick={e => e.stopPropagation()}>
                          <button className="pop-btn" onClick={fullReset}>回到人數設定</button>
                          <button className="pop-btn" style={{background:'#555'}} onClick={() => setShowReset(false)}>取消</button>
                      </div>
                  </div>
              )}

              {activePlayer && (
                <div className="modal-overlay" onClick={() => setActiveMenuId(null)}>
                  <div className="pop-menu" onClick={e => e.stopPropagation()}>
                    <div style={{color:'#fff', textAlign:'center', marginBottom:'1.5vmin', fontWeight:'bold', fontSize:'2vmin'}}>玩家 #{activePlayer.id} 設置</div>
                    {step === 3 && ( <> <button className="pop-btn" onClick={() => { setPlayers(prev => prev.map(p => p.id === activePlayer.id ? {...p, side:'sun'}:p)); setActiveMenuId(null); }}>設置 日方</button> <button className="pop-btn" onClick={() => { setPlayers(prev => prev.map(p => p.id === activePlayer.id ? {...p, side:'moon'}:p)); setActiveMenuId(null); }}>設置 月方</button> </> )}
                    {step === 4 && ( <> {getFilteredRoles().includes('hades') && <button className="pop-btn" onClick={() => { setPlayers(prev => prev.map(p => p.id === activePlayer.id ? {...p, role:'hades'}:p)); setActiveMenuId(null); }}>黑帝斯</button>} {getFilteredRoles().includes('zeus') && <button className="pop-btn" onClick={() => { setPlayers(prev => prev.map(p => p.id === activePlayer.id ? {...p, role:'zeus'}:p)); setActiveMenuId(null); }}>宙斯</button>} {getFilteredRoles().includes('prophet') && <button className="pop-btn" onClick={() => { setPlayers(prev => prev.map(p => p.id === activePlayer.id ? {...p, role:'prophet'}:p)); setActiveMenuId(null); }}>先知</button>} <button className="pop-btn" style={{background:'#c0392b'}} onClick={() => { setPlayers(prev => prev.map(p => p.id === activePlayer.id ? {...p, role:null}:p)); setActiveMenuId(null); }}>取消身分</button> </> )}
                    {(step === 8 || step === 13) && ( <> {getFilteredRoles().map(r => ( <div key={r} style={{display:'flex', gap:'1vmin'}}> <button className="pop-btn" style={{flex:1, fontSize:'1.8vmin'}} onClick={() => { setPlayers(prev => prev.map(p => p.id === activePlayer.id ? {...p, role:r, status:'returned'}:p)); setActiveMenuId(null); }}>{r}(歸)</button> <button className="pop-btn" style={{flex:1, fontSize:'1.8vmin'}} onClick={() => { setPlayers(prev => prev.map(p => p.id === activePlayer.id ? {...p, role:r, status:'revealed'}:p)); setActiveMenuId(null); }}>{r}(現)</button> </div> ))} <button className="pop-btn" style={{background:'#c0392b'}} onClick={() => { setPlayers(prev => prev.map(p => p.id === activePlayer.id ? {...p, role:null, status:'idx'}:p)); setActiveMenuId(null); }}>清空</button> </> )}
                    {step === 10 && <button className="pop-btn" onClick={() => { setPlayers(prev => prev.map(p => p.id === activePlayer.id ? {...p, isGlow:!p.isGlow}:p)); setActiveMenuId(null); }}>擊殺/取消</button>}
                    {step === 11 && ( <> <button className="pop-btn" onClick={() => { setPlayers(prev => prev.map(p => p.id === activePlayer.id ? {...p, role:'pandora'}:p)); setActiveMenuId(null); }}>潘朵拉</button> <button className="pop-btn" onClick={() => { setPlayers(prev => prev.map(p => p.id === activePlayer.id ? {...p, isInfected:true}:p)); setActiveMenuId(null); }}>設置 眷屬</button> <button className="pop-btn" style={{background:'#c0392b'}} onClick={() => { setPlayers(prev => prev.map(p => p.id === activePlayer.id ? {...p, isInfected:false}:p)); setActiveMenuId(null); }}>取消</button> </> )}
                    <button className="pop-btn" style={{background:'#555'}} onClick={() => setActiveMenuId(null)}>關閉</button>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<StarsApp />);
    </script>
</body>
</html>
