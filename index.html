<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>群星失序 GM助手 v1.1</title>
    
										   
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

													   
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>

    <style>
																	
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; overflow: hidden; 
            display: flex; justify-content: center; align-items: center;
            font-family: "Microsoft JhengHei", sans-serif;
        }

        .landscape-app {
            position: relative;
            width: 177.78vh; height: 100vh;
            max-width: 100vw; max-height: 56.25vw;
            background: #000; overflow: hidden;
        }

        @media screen and (orientation: portrait) {
            .portrait-warning {
                position: fixed; inset: 0; background: #000; color: #fff;
                z-index: 99999; display: flex; flex-direction: column;
                justify-content: center; align-items: center; text-align: center; padding: 20px;
							  
            }
        }
        @media screen and (orientation: landscape) { .portrait-warning { display: none; } }

        .bg-video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; transition: opacity 1s ease; pointer-events: none; }
        .version-tag { position: absolute; bottom: 10px; left: 15px; color: rgba(255,255,255,0.4); font-size: 12px; z-index: 9000; pointer-events: none; }

        .top-nav { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 12px; z-index: 5000; background: rgba(0,0,0,0.7); padding: 8px 22px; border-radius: 30px; border: 1px solid #fff; pointer-events: auto; }
        .nav-label { color: #fff; font-weight: bold; font-size: 14px; white-space: nowrap; }
        .btn-circle { width: 34px; height: 34px; border-radius: 50%; border: 1px solid #fff; background: none; color: #fff; cursor: pointer; font-weight: bold; }
        .btn-circle.active { background: #fff; color: #000; }

        .role-display { position: absolute; top: 75px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 400; }
        .role-icon { width: 75px; height: 75px; object-fit: contain; border: 1px solid #fff; border-radius: 8px; }

        @keyframes breathingUI { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
        .center-anchor { 
            position: absolute; left: 50%; width: 45%; z-index: 100; 
            transform: translate(-50%, -50%); pointer-events: none;
            display: flex; flex-direction: column; align-items: center;
        }
        .center-anim-layer { 
            width: 100%; display: flex; flex-direction: column; align-items: center;
            animation: breathingUI 3s infinite ease-in-out; 
        }
        .center-img { width: 100%; height: auto; }
        .center-trigger { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 70%; height: 70%; z-index: 110; pointer-events: auto; cursor: pointer; }
        
        .lock-hint { color: #ff4d4d; font-weight: bold; font-size: 16px; text-shadow: 0 0 10px #000; margin-top: 5px; background: rgba(0,0,0,0.4); padding: 2px 15px; border-radius: 10px; text-align: center; }

        .coord-slot { position: absolute; width: 5.12%; aspect-ratio: 1/1.4; transform: translate(-50%, -50%); z-index: 1000; cursor: pointer; pointer-events: auto; }
        .card-wrap { position: relative; width: 100%; height: 100%; border-radius: 6px; pointer-events: none; }
        
        .glow-red { box-shadow: 0 0 25px 10px rgba(255, 0, 0, 0.9) !important; }
        .glow-blue { box-shadow: 0 0 25px 10px rgba(0, 100, 255, 0.9) !important; }
        .glow-gold { box-shadow: 0 0 25px 10px rgba(255, 215, 0, 0.9) !important; }
        .glow-teal { box-shadow: 0 0 25px 10px rgba(0, 255, 220, 0.9) !important; }
        .glow-inspect { box-shadow: 0 0 35px 15px rgba(255, 240, 0, 1) !important; z-index: 1001; }

        .counter-box { position: absolute; top: 20px; font-size: 32px; font-weight: 900; color: #fff; z-index: 600; text-shadow: 0 0 10px #000; }
        .sun-counter { left: 45px; color: #f1c40f; }
        .moon-counter { right: 45px; color: #9b59b6; }

        .mission-area { position: absolute; top: 2%; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 5px; z-index: 800; pointer-events: auto; }
        .mission-cards-row { display: flex; gap: 10px; }
        .mission-card { width: 72px; cursor: pointer; object-fit: contain; }
        .star-pool-glow { box-shadow: 0 0 15px 5px #d4af37, 0 0 20px 8px #8e44ad !important; border-radius: 5px; }
        .mission-legend { color: #d4af37; font-size: 11px; font-weight: bold; background: rgba(0,0,0,0.6); padding: 2px 10px; border-radius: 10px; border: 1px solid #8e44ad; }

        .pop-menu { position: absolute; background: #111; border: 2px solid #fff; padding: 15px; border-radius: 12px; display: flex; flex-direction: column; gap: 10px; box-shadow: 0 0 40px #000; min-width: 180px; z-index: 9999; max-height: 80vh; overflow-y: auto; }
        .pop-btn { background: #333; color: #fff; border: none; padding: 12px 15px; cursor: pointer; font-size: 16px; border-radius: 8px; text-align: center; }
        .pop-btn:hover:not(:disabled) { background: #fff; color: #000; }
        .pop-btn:disabled { opacity: 0.15; cursor: not-allowed; }

        @keyframes breathingCard { 0% { opacity: 0.4; transform: translate(-50%, -50%) scale(0.95); } 50% { opacity: 1; transform: translate(-50%, -50%) scale(1); } 100% { opacity: 0.4; transform: translate(-50%, -50%) scale(0.95); } }
        .check-card-overlay { position: absolute; top: 20%; left: 50%; transform: translate(-50%, -50%); width: 105px; z-index: 3000; pointer-events: none; animation: breathingCard 2.5s infinite ease-in-out; }

        .info-status-bar { position: absolute; bottom: 95px; left: 50%; transform: translateX(-50%); color: #fff; background: rgba(0,0,0,0.5); padding: 5px 25px; border-radius: 15px; font-size: 18px; font-weight: bold; border: 1px solid rgba(255,255,255,0.2); text-shadow: 0 0 10px #000; white-space: nowrap; }
        .reset-area { position: absolute; bottom: 15px; right: 15px; z-index: 5000; pointer-events: auto; }
        .btn-reset-main { background: rgba(255,255,255,0.15); color: #fff; border: 1px solid #aaa; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-size: 14px; backdrop-filter: blur(5px); }
    </style>
</head>
<body>

    <div class="portrait-warning">
        <h2>💫 星軌導覽</h2>
        <p>請將手機橫放並鎖定旋轉<br>以啟動 GM 輔助儀式</p>
    </div>

    <div id="root"></div>

											 
    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const BASE_URL = "https://raw.githubusercontent.com/n0man-board/stars-out-of-order-assets/main/images/";

        // 中文身分映射
        const ROLE_NAMES = {
            zeus: "宙斯", hades: "哈帝斯", apollo: "阿波羅", hecate: "赫卡忒",
            athena: "雅典娜", prometheus: "普羅米修斯", charon: "卡戎",
            cerberus: "刻耳柏洛斯", pandora: "潘朵拉", cassandra: "卡珊德拉",
            odysseus: "奧德修斯", daedalus: "代達羅斯", melampus: "梅蘭波斯"
        };

        const PLAYER_POSITIONS = {
          "13": [{left:21.4,top:77.9},{left:10.3,top:70.0},{left:5.7,top:60.2},{left:8.2,top:50.2},{left:17.7,top:41.6},{left:32.4,top:35.8},{left:50.0,top:33.8},{left:67.6,top:35.8},{left:82.3,top:41.6},{left:91.8,top:50.2},{left:94.3,top:60.2},{left:89.7,top:70.0},{left:78.6,top:77.9}],
          "12": [{left:21.4,top:77.9},{left:13.6,top:73.1},{left:6.6,top:53.6},{left:15.4,top:43.0},{left:29.1,top:36.7},{left:42.3,top:34.1},{left:57.7,top:34.1},{left:72.2,top:36.7},{left:84.6,top:43.0},{left:93.4,top:53.6},{left:90.3,top:69.3},{left:78.6,top:77.9}],
          "11": [{left:21.4,top:77.9},{left:8.6,top:67.7},{left:8.2,top:50.2},{left:19.7,top:40.5},{left:34.8,top:35.3},{left:50.0,top:33.8},{left:65.2,top:35.3},{left:80.3,top:40.5},{left:91.8,top:50.2},{left:91.4,top:67.7},{left:78.6,top:77.9}],
          "10": [{left:21.4,top:77.9},{left:8.2,top:67.3},{left:8.2,top:50.2},{left:21.4,top:39.6},{left:40.0,top:34.4},{left:60.0,top:34.4},{left:78.6,top:39.6},{left:91.8,top:50.2},{left:91.8,top:67.3},{left:78.6,top:77.9}],
          "9": [{left:21.4,top:77.9},{left:7.1,top:65.3},{left:13.6,top:44.4},{left:31.2,top:36.1},{left:50.0,top:33.8},{left:68.8,top:38.4},{left:86.4,top:44.4},{left:92.9,top:65.3},{left:78.6,top:77.9}],
          "8": [{left:21.4,top:77.9},{left:5.8,top:60.9},{left:18.6,top:41.1},{left:34.8,top:34.6},{left:61.6,top:34.6},{left:81.4,top:41.1},{left:94.2,top:60.9},{left:78.6,top:77.9}],
          "7": [{left:21.4,top:77.9},{left:6.7,top:57.9},{left:24.6,top:38.3},{left:50.0,top:33.8},{left:75.4,top:38.3},{left:93.3,top:57.9},{left:78.6,top:77.9}],
          "6": [{left:21.4,top:77.9},{left:6.2,top:54.4},{left:34.8,top:35.3},{left:65.2,top:35.3},{left:93.8,top:54.4},{left:78.6,top:77.9}],
          "5": [{left:21.4,top:77.9},{left:6.0,top:55.0},{left:50.0,top:33.8},{left:94.0,top:55.0},{left:78.6,top:77.9}]
        };

        const MOON_TARGETS = { "5":2, "6":2, "7":3, "8":3, "9":4, "10":4, "11":4, "12":5, "13":5 };
        const SUN_GOALS = { "5":9, "6":11, "7":12, "8":14, "9":15, "10":17, "11":18, "12":20, "13":21 };
        
        const FACTIONS = {
          sun_gods: ["zeus", "apollo", "athena", "prometheus"],
          mortals: ["odysseus", "daedalus", "melampus", "cassandra", "prometheus"]
        };

        const ROLE_POOL_MAP = {
          "5": ["zeus", "hades", "pandora", "cassandra", "odysseus"],
          "6": ["zeus", "hades", "apollo", "hecate", "cassandra", "odysseus"],
          "7": ["zeus", "hades", "apollo", "hecate", "pandora", "cassandra", "odysseus"],
          "8": ["zeus", "hades", "apollo", "hecate", "prometheus", "charon", "cassandra", "odysseus"],
          "9": ["zeus", "hades", "apollo", "hecate", "prometheus", "charon", "pandora", "cassandra", "odysseus"],
          "10": ["zeus", "hades", "apollo", "hecate", "athena", "charon", "cerberus", "cassandra", "odysseus", "daedalus"],
          "11": ["zeus", "hades", "apollo", "hecate", "prometheus", "charon", "cerberus", "cassandra", "odysseus", "daedalus", "melampus"],
          "12": ["zeus", "hades", "apollo", "hecate", "prometheus", "charon", "cerberus", "pandora", "cassandra", "odysseus", "daedalus", "melampus"],
          "13": ["zeus", "hades", "apollo", "hecate", "prometheus", "athena", "charon", "cerberus", "pandora", "cassandra", "odysseus", "daedalus", "melampus"]
        };

        const MISSION_MAP = {
          "5": [2, 2, 3, 3, 4, 4], "6": [2, 3, 3, 4, 4, 5], "7": [3, 3, 4, 4, 5, 5],
          "8": [3, 4, 4, 5, 5, 6], "9": [4, 4, 5, 5, 6, 6], "10": [4, 5, 5, 6, 6, 7],
          "11": [5, 5, 6, 6, 7, 7], "12": [5, 6, 6, 7, 7, 8], "13": [6, 6, 7, 7, 8, 8]
        };

        function StarsApp() {
          const [step, setStep] = useState(1);
          const [playerCount, setPlayerCount] = useState(null);
          const [players, setPlayers] = useState([]);
          const [round, setRound] = useState(1);
          const [sunScore, setSunScore] = useState(0);
          const [lastSunScore, setLastSunScore] = useState(0); 
          const [moonScore, setMoonScore] = useState(0);
          const [tempCards, setTempCards] = useState([]);
          const [inspectingId, setInspectingId] = useState(null);
          const [activeMenuId, setActiveMenuId] = useState(null);
          const [showReset, setShowReset] = useState(false);

          const videoRefs = { v1: useRef(null), v2: useRef(null), v3: useRef(null), v4: useRef(null), v5: useRef(null), v6: useRef(null) };
										

          const getActiveVid = () => {
            if (step <= 2) return "v1";
            if (step >= 3 && step <= 6) return "v2";
            if (step === 7 || step === 8 || step === 12 || step === 13) return "v3";
            if (step >= 9 && step <= 11) return "v4";
            if (step === 14) return "v5";
            if (step === 15) return "v6";
            return "v1";
          };

          useEffect(() => {
            const active = getActiveVid();
            Object.keys(videoRefs).forEach(k => {
              const el = videoRefs[k].current;
              if (!el) return;
              if (k === active) { el.play().catch(()=>{}); el.style.opacity = "1"; }
              else { el.pause(); el.style.opacity = "0"; }
            });
          }, [step]);

          const initGame = (n) => {
            setPlayerCount(n);
            setPlayers(Array.from({ length: n }, (_, i) => ({ id: i + 1, side: 'sun', role: null, isInfected: false, isGlow: false, status: 'idx' })));
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(() => {});
            }
          };

																																												  

																	 
																					
          const hitMilestone = useMemo(() => {
            const m = [3, 5, 8, 11, 14, 17, 20];
            return m.some(v => sunScore >= v && lastSunScore < v);
          }, [sunScore, lastSunScore]);

          const checkVictoryResult = () => {
            if (!playerCount) return "CONTINUE";
            const pool = ROLE_POOL_MAP[playerCount];
            const deadRoleNames = players.filter(p => p.status === 'returned').map(p => p.role);
            const confirmedRevealed = players.map(p => p.role).filter(r => r !== null);
            const hiddenPool = pool.filter(r => !confirmedRevealed.includes(r));
            const aliveRoles = [...players.filter(p => p.status !== 'returned' && p.role).map(p => p.role), ...hiddenPool];

            const isGodsExtinct = !aliveRoles.some(r => FACTIONS.sun_gods.includes(r));
            const isMortalsExtinct = !aliveRoles.some(r => FACTIONS.mortals.includes(r));

            if (isGodsExtinct || isMortalsExtinct) return "MOON_WIN";
            if (sunScore >= SUN_GOALS[playerCount]) return "SUN_WIN";
            return "CONTINUE";
          };

          const validation = useMemo(() => {
            if (!playerCount) return { ok: true };
            if (step === 3) {
              const moons = players.filter(p => p.side === 'moon').length;
              const target = MOON_TARGETS[playerCount];
              return { ok: moons === target, hint: "需設置 " + target + " 位月方 (目前 " + moons + ")" };
            }
            if (step === 4) {
              const hasZ = players.some(p=>p.role==='zeus'), hasH = players.some(p=>p.role==='hades'), hasC = players.some(p=>p.role==='cassandra');
              if (!hasZ || !hasH || !hasC) return { ok: false, hint: "需完成宙斯、黑帝斯與卡珊德拉設置" };
            }
            return { ok: true };
          }, [step, players, playerCount]);

          const centerImgName = useMemo(() => {
            if (step === 1) return playerCount ? "set_1.png" : "star.png";
            if (step === 8) return hitMilestone ? "set_7_2.png" : "set_7_1.png";
            if (step === 12) return "set_4.png"; 
            if (step === 13) return "set_11.png";
            if (step === 14) return "set_12.png"; 
            if (step === 15) return "set_13.png"; 
            return "set_" + (step - 1) + ".png";
          }, [step, playerCount, hitMilestone]);

          const onCenterClick = () => {
            if (step === 1 && !playerCount) return;
            if (!validation.ok) return;
            setInspectingId(null);
            if (step === 1) { setStep(3); return; }
            if (step === 7) {
              setLastSunScore(sunScore); 
              let s = 0, m = 0; tempCards.forEach(c => { if(c === 1) s++; if(c === 2) m++; });
              setSunScore(v => v + s); setMoonScore(v => v + m);
            }
            if (step === 13) {
              const res = checkVictoryResult();
																							  
																				
																		 
																														
																					
																					  
              if (res === "MOON_WIN") setStep(15);
              else if (res === "SUN_WIN") setStep(14);
              else { setRound(r => r + 1); setPlayers(prev => prev.map(p => ({ ...p, isGlow: false }))); setStep(7); }
            } else if (step < 14) { setStep(s => s + 1); }
            setActiveMenuId(null);
          };

          const onCoordClick = (e, p) => {
            e.stopPropagation();
            if (step <= 2 || step === 6 || step === 9) return;
            if (step === 5 || step === 12) { setInspectingId(p.id === inspectingId ? null : p.id); return; }
            setActiveMenuId(p.id);
          };

          const missionCardsCount = useMemo(() => {
            if (!playerCount) return 0;
            const base = MISSION_MAP[playerCount][round - 1] || MISSION_MAP[playerCount][MISSION_MAP[playerCount].length-1];
            if (round === 1) return base + 2;
            if (round === 2) return base + 1;
            return base;
          }, [playerCount, round]);

          useEffect(() => { if (step === 7 && playerCount) setTempCards(new Array(missionCardsCount).fill(0)); }, [step, round, playerCount, missionCardsCount]);

          const activeP = useMemo(() => players.find(p => p.id === activeMenuId), [activeMenuId, players]);
          
          const getFilteredRoles = () => {
            if (!playerCount) return [];
            const usedRoles = players.filter(p => p.id !== activeMenuId && p.role !== null).map(p => p.role);
            const core = ["zeus", "hades", "cassandra"];
            const pool = ROLE_POOL_MAP[playerCount];
            let final = [...new Set([...core, ...pool])];
            if (step === 4 && activeP) {
              if (activeP.side === 'moon') final = ["hades"];
              else final = ["zeus", "cassandra"];
            }
            return final.filter(role => !usedRoles.includes(role));
          };

          return (
            <div className="landscape-app" onClick={() => { setActiveMenuId(null); setInspectingId(null); }}>
              <style>{styles}</style>
              {["bg_video1.mp4", "bg_video2.mp4", "bg_video3.mp4", "bg_video4.mp4", "bg_video5.mp4", "bg_video6.mp4"].map((v, i) => (
                <video key={v} ref={videoRefs["v" + (i+1)]} className="bg-video" loop muted playsInline><source src={BASE_URL + v} type="video/mp4" /></video>
              ))}
              

              <div className="version-tag">v1.0</div>

              {step === 1 && (
                <div className="top-nav" onClick={e => e.stopPropagation()}>
                  <div className="nav-label">選擇玩家人數：</div>
                  {[5,6,7,8,9,10,11,12,13].map(n => ( <button key={n} className={"btn-circle " + (playerCount === n ? 'active' : '')} onClick={() => initGame(n)}>{n}</button> ))}
                </div>
              )}

              {(step === 1 || step === 2) && playerCount && (
                <div className="role-display">
                  {ROLE_POOL_MAP[playerCount].map(r => ( <img key={r} src={BASE_URL + r + ".png"} className="role-icon" /> ))}
                </div>
              )}

              <div className="center-anchor" style={{ top: step === 1 ? '52%' : '59%' }}>
                <div className="center-anim-layer">
                  <img src={BASE_URL + centerImgName} className="center-img" />
                  {!validation.ok && step > 1 && <div className="lock-hint">{validation.hint}</div>}
                </div>
                <div className="center-trigger" onClick={(e) => { e.stopPropagation(); onCenterClick(); }} />
              </div>

              {playerCount && PLAYER_POSITIONS[playerCount].map((pos, i) => {
                const p = players[i]; if (!p) return null;
                const xx = String(p.id).padStart(2, '0');
                let img = p.status === 'returned' ? (p.role + "_D.png") : (p.status === 'revealed' ? (p.role + ".png") : ("idx_" + xx + ".png"));
                let glow = p.id === inspectingId ? "glow-inspect" : (p.isGlow ? "glow-red" : (step === 3 && p.side === 'moon' ? "glow-blue" : (step === 4 && p.role === 'zeus' ? "glow-gold" : (step === 4 && p.role === 'hades' ? "glow-blue" : (step === 4 && p.role === 'cassandra' ? "glow-teal" : "")))));
                return (
                  <div key={p.id} className={"coord-slot " + glow} style={{ left: pos.left + "%", top: pos.top + "%" }} onClick={(e) => onCoordClick(e, p)}>
                    <div className="card-wrap"><img src={BASE_URL + img} width="100%" height="100%" style={{objectFit:'contain'}}/><img src={BASE_URL + "s" + xx + ".png"} style={{position:'absolute',inset:0,width:'100%',objectFit:'contain'}}/></div>
                  </div>
                );
              })}

              {(step === 7 || step === 8) && ( <div className="info-status-bar"> 第 {round} 輪任務 | 太陽目標：{SUN_GOALS[playerCount]} | 達成率：{Math.round((sunScore/SUN_GOALS[playerCount])*100)}% </div> )}
              {(step === 7 || step === 8 || step >= 13) && ( <div style={{pointerEvents:'none'}}> <div className="counter-box sun-counter">日: {sunScore}</div> <div className="counter-box moon-counter">月: {moonScore}</div> </div> )}

              {step === 7 && (
                <div className="mission-area" onClick={e => e.stopPropagation()}>
                  <div className="mission-cards-row">
                    {tempCards.map((c, idx) => {
                      const isPool = (round === 1 && idx >= tempCards.length - 2) || (round === 2 && idx >= tempCards.length - 1);
                      return ( <img key={idx} src={BASE_URL + "card_" + c + ".png"} className={"mission-card " + (isPool ? 'star-pool-glow' : '')} onClick={() => { const next = [...tempCards]; next[idx] = (next[idx] + 1) % 4; setTempCards(next); }} /> );
                    })}
                  </div>
                </div>
              )}

              {inspectingId && activeP && ( 
                <img src={BASE_URL + (activeP.isInfected ? 'card_2.png' : (['zeus','hades','cassandra'].includes(activeP.role) ? 'card_0.png' : (activeP.side === 'moon' ? 'card_2.png' : 'card_1.png')))} className="check-card-overlay" /> 
              )}

              <div className="reset-area"> <button className="btn-reset-main" onClick={(e) => { e.stopPropagation(); setShowReset(true); }}>重新開始</button> </div>
              {showReset && ( <div className="modal-overlay" onClick={() => setShowReset(false)}><div className="pop-menu" onClick={e => e.stopPropagation()}><button className="pop-btn" onClick={() => { setStep(1); setPlayerCount(null); setPlayers([]); setRound(1); setSunScore(0); setMoonScore(0); setInspectingId(null); setShowReset(false); }}>回到人數設定</button><button className="pop-btn" style={{background:'#555'}} onClick={() => setShowReset(false)}>取消</button></div></div> )}

              {activeMenuId && activeP && (
                <div className="modal-overlay" onClick={() => setActiveMenuId(null)}>
                  <div className="pop-menu" onClick={e => e.stopPropagation()}>
                    <div style={{color:'#fff', textAlign:'center', marginBottom:'10px', fontWeight:'bold'}}>玩家 #{activeMenuId} 設置</div>
                    {step === 3 && ( <><button className="pop-btn" onClick={() => { setPlayers(p => p.map(x => x.id === activeMenuId ? {...x, side:'sun'}:x)); setActiveMenuId(null); }}>設置 日方</button><button className="pop-btn" onClick={() => { setPlayers(p => p.map(x => x.id === activeMenuId ? {...x, side:'moon'}:x)); setActiveMenuId(null); }}>設置 月方</button></> )}
                    {step === 4 && ( <>{getFilteredRoles().map(r => <button key={r} className="pop-btn" onClick={() => { setPlayers(p => p.map(x => x.id === activeMenuId ? {...x, role:r}:x)); setActiveMenuId(null); }}>{ROLE_NAMES[r] || r}</button>)}<button className="pop-btn" style={{background:'#c0392b'}} onClick={() => { setPlayers(p => p.map(x => x.id === activeMenuId ? {...x, role:null}:x)); setActiveMenuId(null); }}>取消身分</button></> )}
                    {(step === 8 || step === 13) && ( <><div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'5px'}}>{getFilteredRoles().map(r => ( <React.Fragment key={r}><button className="pop-btn" style={{fontSize:'12px'}} onClick={() => { setPlayers(p => p.map(x => x.id === activeMenuId ? {...x, role:r, status:'returned'}:x)); setActiveMenuId(null); }}>{ROLE_NAMES[r] || r}(歸)</button><button className="pop-btn" style={{fontSize:'12px'}} onClick={() => { setPlayers(p => p.map(x => x.id === activeMenuId ? {...p, role:r, status:'revealed'}:x)); setActiveMenuId(null); }}>{ROLE_NAMES[r] || r}(現)</button></React.Fragment> )) }</div><button className="pop-btn" style={{background:'#c0392b'}} onClick={() => { setPlayers(p => p.map(x => x.id === activeMenuId ? {...p, role:null, status:'idx'}:p)); setActiveMenuId(null); }}>清空身分</button></> )}
                    {step === 10 && <button className="pop-btn" onClick={() => { setPlayers(p => p.map(x => x.id === activeMenuId ? {...x, isGlow:!x.isGlow}:x)); setActiveMenuId(null); }}>擊殺 / 取消</button>}
                    {step === 11 && ( <><button className="pop-btn" onClick={() => { setPlayers(p => p.map(x => x.id === activeMenuId ? {...x, role:'pandora'}:x)); setActiveMenuId(null); }}>設置 潘朵拉 (月)</button><button className="pop-btn" onClick={() => { setPlayers(p => p.map(x => x.id === activeMenuId ? {...x, isInfected:true}:x)); setActiveMenuId(null); }}>設置 眷屬 (月)</button><button className="pop-btn" style={{background:'#c0392b'}} onClick={() => { setPlayers(p => p.map(x => x.id === activeMenuId ? {...x, isInfected:false}:x)); setActiveMenuId(null); }}>重置狀態</button></> )}
                    <button className="pop-btn" style={{background:'#555'}} onClick={() => setActiveMenuId(null)}>關閉</button>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<StarsApp />);
    </script>
</body>
</html>
